<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocSpoofer — Screenshots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0c0c0c;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.2);
            --white: #ffffff;
            --gray-2: #a0a0a0;
            --gray-3: #666666;
            --gray-4: #333333;
            --green: #00d26a;
            --green-dim: rgba(0,210,106,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 1000;
            padding: 1.25rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5,5,5,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-weight: 900;
            font-size: 1.25rem;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--white);
            text-decoration: none;
        }

        .nav-logo svg { width: 28px; height: 28px; }

        .nav-links { display: flex; align-items: center; gap: 1.5rem; }

        .nav-links a {
            color: var(--gray-2);
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--white); }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1),
                        transform 0.8s cubic-bezier(0.16,1,0.3,1);
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        h1 {
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1.08;
        }

        section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10rem 1.5rem 4rem;
            text-align: center;
        }

        section h1 { font-size: clamp(2.5rem, 7vw, 4rem); margin-bottom: 1rem; }

        .subtitle {
            color: var(--gray-2);
            font-size: clamp(1rem, 2vw, 1.25rem);
            max-width: 500px;
            margin: 0 auto 3rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .gallery-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16/10;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), border-color 0.4s;
        }

        .gallery-item:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: var(--border-hover);
        }

        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item .fallback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-4);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .gallery-item img { position: relative; z-index: 1; }

        footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            text-align: center;
            color: var(--gray-4);
            font-size: 0.8125rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="8" fill="#fff"/>
            <path d="M14 6C10.5 6 8 9.5 8 13c0 5 6 11 6 11s6-6 6-11c0-3.5-2.5-7-6-7z" fill="#000"/>
            <circle cx="14" cy="12.5" r="2.5" fill="#fff"/>
        </svg>
        LocSpoofer
    </a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="screenshots.html" class="active">Screenshots</a>
    </div>
</nav>

<section>
    <h1 class="reveal">App Gallery</h1>
    <p class="subtitle reveal" style="transition-delay:0.1s">See LocSpoofer in action.</p>

    <div class="gallery-grid">
        <div class="gallery-item reveal" style="transition-delay:0.2s">
            <span class="fallback">image1.png</span>
            <img src="image1.png" alt="LocSpoofer Dashboard" onerror="this.style.display='none'">
        </div>
        <div class="gallery-item reveal" style="transition-delay:0.3s">
            <span class="fallback">image2.png</span>
            <img src="image2.png" alt="LocSpoofer in action" onerror="this.style.display='none'">
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 LocSpoofer. All rights reserved.</p>
</footer>

<script>
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
